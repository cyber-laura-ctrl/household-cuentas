<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liza & Laura — Household Tracker</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = {
      apiKey:            "AIzaSyDfB_XglEf6d8ggoAlr17F_Mvr-RBk63oE",
      authDomain:        "house-cuentas.firebaseapp.com",
      databaseURL:       "https://house-cuentas-default-rtdb.firebaseio.com",
      projectId:         "house-cuentas",
      storageBucket:     "house-cuentas.firebasestorage.app",
      messagingSenderId: "773416483516",
      appId:             "1:773416483516:web:af9b075df77142f2906eb9"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    window._dbSave = async (key, value) => { await set(ref(db, "hhtracker/" + key), value); };
    window._dbLoad = async (key) => { const s = await get(ref(db, "hhtracker/" + key)); return s.exists() ? s.val() : null; };
    window._DB_READY = true;
    window.dispatchEvent(new Event("db-ready"));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f0; color: #2d3a2e; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    #app { display: flex; flex-direction: column; min-height: 100vh; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 15px; color: #6b8f71; }

    /* header */
    header { background: #2d5a3d; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: .01em; }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .month-nav span { font-size: 15px; font-weight: 600; min-width: 155px; text-align: center; }

    /* nav tabs */
    nav { background: #fff; border-bottom: 2px solid #c8ddc9; padding: 0 20px; display: flex; gap: 4px; overflow-x: auto; }
    .btn-tab { background: none; border: none; border-bottom: 3px solid transparent; color: #6b8f71; padding: 13px 16px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; margin-bottom: -2px; }
    .btn-tab.active { color: #2d5a3d; border-bottom-color: #2d5a3d; font-weight: 700; }

    main { padding: 20px; max-width: 960px; margin: 0 auto; width: 100%; }

    /* buttons */
    button { cursor: pointer; font-family: inherit; }
    .btn-nav { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 6px; padding: 6px 13px; font-size: 14px; }
    .btn-nav:hover { background: rgba(255,255,255,.3); }
    .btn-add  { background: #2d5a3d; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; }
    .btn-settle { background: #3a8a4a; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; }
    .btn-ghost { background: none; border: 1px solid #c8ddc9; color: #6b8f71; border-radius: 6px; padding: 6px 12px; font-size: 12px; }
    .btn-icon { background: none; border: none; color: #a0b8a2; padding: 2px 5px; font-size: 13px; }
    .btn-pdf  { background: #5b8a6e; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 600; }
    .btn-save-split { background: #2d5a3d; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; }

    /* cards */
    .card { background: #fff; border: 1px solid #c8ddc9; border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .card-title { font-size: 11px; font-weight: 700; color: #6b8f71; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .kv { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; font-size: 13px; }
    .kv .k { color: #6b8f71; }
    .kv .v { font-weight: 600; color: #2d3a2e; }
    .divider { height: 1px; background: #e8f0e8; margin: 10px 0; }
    .big { font-size: 26px; font-weight: 700; color: #2d3a2e; }

    /* inputs */
    input, select, textarea { background: #f7fbf7; border: 1px solid #c8ddc9; color: #2d3a2e; border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #5b8a6e; border-color: #5b8a6e; }
    textarea { resize: vertical; min-height: 60px; }

    /* banners */
    .banner { border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .banner.pending { background: #fffbeb; border: 1px solid #f0c060; }
    .banner.settled { background: #f0faf0; border: 1px solid #6db87a; }
    .banner.even    { background: #f0faf0; border: 1px solid #6db87a; }
    .banner-label { font-size: 11px; font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
    .banner-main  { font-size: 16px; font-weight: 700; }
    .banner-sub   { font-size: 12px; color: #6b8f71; margin-top: 4px; }

    /* pills */
    .pill { border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 600; display: inline-block; }
    .pill-a   { background: #d4edda; color: #2d5a3d; }
    .pill-b   { background: #cfe8e8; color: #1f5f5f; }
    .pill-exp { background: #eee; color: #666; }
    .pill-sav { background: #fef3c7; color: #92600a; }

    /* table */
    .tbl-wrap { overflow-x: auto; }
    .tbl-head, .tbl-row { display: grid; grid-template-columns: 1.2fr 100px 85px 80px 68px 76px; gap: 8px; align-items: center; }
    .tbl-head { padding: 6px 0 8px; border-bottom: 2px solid #e8f0e8; }
    .tbl-head span { font-size: 11px; color: #6b8f71; font-weight: 700; text-transform: uppercase; }
    .tbl-row { padding: 9px 0; border-bottom: 1px solid #f0f5f0; font-size: 13px; }
    .tbl-row:hover { background: #f7fbf7; }
    .tbl-row input, .tbl-row select { padding: 5px 8px; font-size: 12px; }
    .add-row { display: grid; grid-template-columns: 1.2fr 100px 85px 80px 68px 76px; gap: 8px; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid #e8f0e8; }

    /* modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #fff; border: 1px solid #c8ddc9; border-radius: 16px; padding: 28px; width: 360px; box-shadow: 0 12px 40px rgba(0,0,0,.15); }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: #2d3a2e; }
    .modal p  { font-size: 13px; color: #6b8f71; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 12px; color: #6b8f71; display: block; margin-bottom: 5px; font-weight: 600; }
    .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }

    /* chart */
    .chart-wrap { position: relative; height: 200px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
    canvas { max-height: 200px; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #4a6b4c; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* split editor */
    .split-editor { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .split-editor input { width: 70px; }

    /* history */
    .hist-row { padding: 12px 0; border-bottom: 1px solid #e8f0e8; }
    .hist-row .top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .hist-note { font-size: 12px; color: #6b8f71; margin-top: 4px; font-style: italic; }
    .pending-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f0a020; margin-right: 5px; }

    /* savings tab */
    .savings-total { font-size: 32px; font-weight: 700; color: #2d5a3d; margin: 8px 0 4px; }
    .savings-sub { font-size: 13px; color: #6b8f71; }
    .savings-bar { height: 10px; background: #e8f0e8; border-radius: 10px; overflow: hidden; margin: 8px 0; }
    .savings-bar-fill { height: 100%; background: linear-gradient(90deg, #5b8a6e, #3a8a4a); border-radius: 10px; transition: width .5s; }

    /* sync dot */
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #6db87a; display: inline-block; margin-left: 8px; }
    .sync-dot.saving { background: #f0a020; }

    @media print {
      header, nav, .btn-pdf, .btn-settle, .btn-ghost, .btn-icon, .btn-add, .add-row, .btn-nav, .btn-tab, .btn-save-split { display: none !important; }
      body { background: #fff; }
      .card { box-shadow: none; border: 1px solid #ccc; }
    }
    @media (max-width: 640px) {
      .grid2, .grid3 { grid-template-columns: 1fr; }
      .tbl-head, .tbl-row, .add-row { grid-template-columns: 1fr 75px 75px 60px; }
      .tbl-head span:nth-child(5), .tbl-row > *:nth-child(5), .add-row > *:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>
<div id="loading">🌿 Loading your tracker…</div>
<div id="app" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const PA = "Liza", PB = "Laura";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const CATS = ["Groceries","Restaurant","Transportation","Entertainment","Personal Care","Health","Shopping","Travel","Kids","Pets","Other"];
const CAT_COLORS = ["#5b8a6e","#3a8a4a","#7ab89a","#a8d5b5","#c8e6c9","#4a7c6e","#2d5a3d","#6db87a","#9ecfaa","#b8dfc0","#d4edd8"];

const DEFAULT_FIXED = [
  {id:"f1",description:"Mortgage",      category:"Mortgage",      amount:1818.39,paidBy:PA,type:"expense"},
  {id:"f2",description:"Car Insurance", category:"Insurance",     amount:317.33, paidBy:PA,type:"expense"},
  {id:"f3",description:"Strata",        category:"Insurance",     amount:205.52, paidBy:PA,type:"expense"},
  {id:"f4",description:"Home Insurance",category:"Insurance",     amount:40.25,  paidBy:PA,type:"expense"},
  {id:"f5",description:"Cookie Insurance",category:"Insurance",   amount:148.84, paidBy:PA,type:"expense"},
  {id:"f6",description:"Utilities",     category:"General",       amount:390.05, paidBy:PA,type:"expense"},
  {id:"f7",description:"Rogers",        category:"Phone/Internet",amount:124.33, paidBy:PA,type:"expense"},
  {id:"f8",description:"Shaw",          category:"Internet",      amount:68.21,  paidBy:PA,type:"expense"},
  {id:"f9",description:"Gym",           category:"Health",        amount:180.00, paidBy:PA,type:"expense"},
  {id:"f10",description:"Savings",      category:"Savings",       amount:3000.00,paidBy:PA,type:"savings"},
];

const fmt   = v => "$"+Number(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const uid   = () => Math.random().toString(36).slice(2,9);
const mKey  = (y,m) => `${y}-${String(m+1).padStart(2,"0")}`;
const today = () => new Date().toISOString().slice(0,10);
const pct   = v => Math.round(v*100);

let state = {
  data:{}, tab:"dashboard",
  year:new Date().getFullYear(), month:new Date().getMonth(),
  newDesc:"",newCat:"Groceries",newAmt:"",newPaid:PA,newType:"expense",
  editId:null,editVals:{},
  showModal:false,settleDate:today(),settleNote:"",
  syncing:false,
  editSplit:false, splitA:"64", splitB:"36",
};

let chartInst = null;

function curKey()  { return mKey(state.year,state.month); }
function curMonth(){ const k=curKey(); return state.data[k]||initMonth(k); }
function initMonth(key){
  return {key,fixed:DEFAULT_FIXED.map(e=>({...e,id:uid()})),variable:[],settlement:null,note:"",splitA:64,splitB:36};
}
function getMonthSplit(m){ return {sa:(m.splitA||64)/100, sb:(m.splitB||36)/100}; }

// firebase
let saveTimer=null;
async function saveData(){
  if(!window._DB_READY) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    setSyncing(true);
    try{ await window._dbSave("data",state.data); }catch(e){ console.error(e); }
    setSyncing(false);
  },800);
}
async function loadData(){
  if(!window._DB_READY) return;
  try{ const d=await window._dbLoad("data"); if(d) state.data=d; }catch(e){ console.error(e); }
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="flex";
  render();
}
function setSyncing(v){ state.syncing=v; const el=document.getElementById("syncdot"); if(el) el.className="sync-dot"+(v?" saving":""); }

function setMonth(updater){
  const k=curKey(), m=state.data[k]||initMonth(k);
  state.data[k]=updater(m); saveData(); render();
}

function navigate(dir){
  let mo=state.month+dir,y=state.year;
  if(mo<0){mo=11;y--;} if(mo>11){mo=0;y++;}
  state.month=mo;state.year=y;
  // initialize month in data if not yet saved so editing works
  const k=mKey(y,mo);
  if(!state.data[k]){ state.data[k]=initMonth(k); saveData(); }
  render();
}

function addEntry(){
  if(!state.newDesc||!state.newAmt) return;
  const e={id:uid(),description:state.newDesc,category:state.newCat,amount:parseFloat(state.newAmt),paidBy:state.newPaid,type:state.newType};
  setMonth(m=>({...m,variable:[...m.variable,e]}));
  state.newDesc=state.newAmt="";
}

function removeEntry(id,isFixed){
  if(isFixed) setMonth(m=>({...m,fixed:m.fixed.filter(e=>e.id!==id)}));
  else        setMonth(m=>({...m,variable:m.variable.filter(e=>e.id!==id)}));
}
function startEdit(e){ state.editId=e.id; state.editVals={description:e.description,category:e.category||"Other",amount:e.amount,paidBy:e.paidBy,type:e.type}; render(); }
function saveEdit(id,isFixed){
  const upd=arr=>arr.map(e=>e.id===id?{...e,...state.editVals,amount:parseFloat(state.editVals.amount)}:e);
  if(isFixed) setMonth(m=>({...m,fixed:upd(m.fixed)}));
  else        setMonth(m=>({...m,variable:upd(m.variable)}));
  state.editId=null;
}
function markSettled(owedBy,owedTo,owedAmt){
  setMonth(m=>({...m,settlement:{date:state.settleDate,note:state.settleNote,amount:owedAmt,paidBy:owedBy,paidTo:owedTo}}));
  state.showModal=false;state.settleNote="";state.settleDate=today();
}
function unsettle(){ setMonth(m=>({...m,settlement:null})); }
function saveNote(val){ setMonth(m=>({...m,note:val})); }
function saveSplit(){
  const a=parseFloat(state.splitA),b=parseFloat(state.splitB);
  if(isNaN(a)||isNaN(b)||Math.abs(a+b-100)>0.01){ alert("Percentages must add up to 100"); return; }
  setMonth(m=>({...m,splitA:a,splitB:b}));
  state.editSplit=false;
}

function calcMonth(m){
  const {sa,sb}=getMonthSplit(m);
  if(!m.fixed) m.fixed=DEFAULT_FIXED.map(e=>({...e,id:uid()}));
  if(!m.variable) m.variable=[];
  if(!m.settlement) m.settlement=null;
  const all=[...m.fixed,...m.variable];
  const exp=all.filter(e=>e.type==="expense"),sav=all.filter(e=>e.type==="savings");
  const totExp=exp.reduce((s,e)=>s+Number(e.amount),0);
  const totSav=sav.reduce((s,e)=>s+Number(e.amount),0);
  const pAe=exp.filter(e=>e.paidBy===PA).reduce((s,e)=>s+Number(e.amount),0);
  const pBe=exp.filter(e=>e.paidBy===PB).reduce((s,e)=>s+Number(e.amount),0);
  const pAs=sav.filter(e=>e.paidBy===PA).reduce((s,e)=>s+Number(e.amount),0);
  const pBs=sav.filter(e=>e.paidBy===PB).reduce((s,e)=>s+Number(e.amount),0);
  const netA=pAe-totExp*sa;
  // variable by category
  const byCat={};
  m.variable.filter(e=>e.type==="expense").forEach(e=>{
    const c=e.category||"Other";
    byCat[c]=(byCat[c]||0)+Number(e.amount);
  });
  return {exp,sav,totExp,totSav,pAe,pBe,pAs,pBs,sa,sb,
    shareAe:totExp*sa,shareBe:totExp*sb,shareAs:totSav*sa,shareBs:totSav*sb,netA,byCat};
}

// ── render helpers ────────────────────────────────────────────
function pill(label,cls){ return `<span class="pill ${cls}">${label}</span>`; }

function renderBanner(c,m){
  const {netA}=c;
  if(Math.abs(netA)<.01) return `<div class="banner even"><div><div class="banner-label" style="color:#3a8a4a">Settlement</div><div class="banner-main" style="color:#2d5a3d">All even — no payment needed ✓</div></div></div>`;
  if(m.settlement) return `
    <div class="banner settled">
      <div>
        <div class="banner-label" style="color:#3a8a4a">Settlement Completed ✓</div>
        <div class="banner-main" style="color:#2d5a3d">${m.settlement.paidBy} paid ${m.settlement.paidTo} ${fmt(m.settlement.amount)}</div>
        <div class="banner-sub">📅 ${m.settlement.date}${m.settlement.note?" · "+m.settlement.note:""}</div>
      </div>
      <button class="btn-ghost" onclick="unsettle()">Undo</button>
    </div>`;
  const owedBy=netA>0?PB:PA,owedTo=netA>0?PA:PB,owedAmt=Math.abs(netA);
  return `
    <div class="banner pending">
      <div>
        <div class="banner-label" style="color:#c08010">Settlement Pending</div>
        <div class="banner-main">${owedBy} owes ${owedTo} <span style="color:#c08010">${fmt(owedAmt)}</span></div>
      </div>
      <button class="btn-settle" onclick="openSettle()">Mark as Settled</button>
    </div>`;
}

function renderSplitEditor(m){
  if(state.editSplit) return `
    <div class="split-editor">
      <span style="font-size:13px;color:#6b8f71">${PA}:</span>
      <input type="number" style="width:65px" value="${state.splitA}" oninput="state.splitA=this.value"> %
      <span style="font-size:13px;color:#6b8f71">${PB}:</span>
      <input type="number" style="width:65px" value="${state.splitB}" oninput="state.splitB=this.value"> %
      <button class="btn-save-split" onclick="saveSplit()">Save</button>
      <button class="btn-ghost" onclick="state.editSplit=false;render()">Cancel</button>
    </div>`;
  return `
    <div class="split-editor">
      <span style="font-size:13px;color:#2d3a2e">${PA}: <b>${m.splitA||64}%</b></span>
      <span style="font-size:13px;color:#2d3a2e;margin-left:12px">${PB}: <b>${m.splitB||36}%</b></span>
      <button class="btn-ghost" style="margin-left:10px" onclick="state.splitA='${m.splitA||64}';state.splitB='${m.splitB||36}';state.editSplit=true;render()">Edit Split</button>
    </div>`;
}

function renderDashboard(c,m){
  const varTotal=Object.values(c.byCat).reduce((s,v)=>s+v,0);
  const chartData=Object.entries(c.byCat);
  setTimeout(()=>{
    const canvas=document.getElementById("expChart");
    if(!canvas||!chartData.length) return;
    if(chartInst){ chartInst.destroy(); chartInst=null; }
    chartInst=new Chart(canvas,{
      type:"doughnut",
      data:{
        labels:chartData.map(([k])=>k),
        datasets:[{data:chartData.map(([,v])=>v),backgroundColor:CAT_COLORS,borderWidth:2,borderColor:"#fff"}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${Math.round(ctx.raw/varTotal*100)}%)`}}}}
    });
  },50);

  const lizaSavNote = `${PA} physically transfers $${fmt(c.totSav)} each month. ${PB}'s share (${pct(c.sb)}% = ${fmt(c.shareBs)}) is included in the monthly settlement.`;

  return `
    ${renderBanner(c,m)}
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">Monthly Split <button class="btn-pdf" onclick="window.print()" style="float:right">🖨️ Export PDF</button></div>
      ${renderSplitEditor(m)}
    </div>
    <div class="grid3">
      <div class="card"><div class="card-title">Total Expenses</div><div class="big">${fmt(c.totExp)}</div></div>
      <div class="card"><div class="card-title">Variable Expenses</div><div class="big" style="color:#5b8a6e">${fmt(m.variable.filter(e=>e.type==="expense").reduce((s,e)=>s+Number(e.amount),0))}</div></div>
      <div class="card"><div class="card-title">Monthly Savings</div><div class="big" style="color:#3a8a4a">${fmt(c.totSav)}</div><div style="font-size:11px;color:#6b8f71;margin-top:4px">${PA}: ${fmt(c.shareAs)} · ${PB}: ${fmt(c.shareBs)}</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title" style="color:#2d5a3d">${PA} — ${pct(c.sa)}%</div>
        <div class="kv"><span class="k">Fair share of expenses</span><span class="v">${fmt(c.shareAe)}</span></div>
        <div class="kv"><span class="k">Actually paid</span><span class="v">${fmt(c.pAe)}</span></div>
        <div class="divider"></div>
        <div class="kv"><span class="k">Savings share (${pct(c.sa)}%)</span><span class="v" style="color:#3a8a4a">${fmt(c.shareAs)}</span></div>
        <div style="font-size:11px;color:#6b8f71;line-height:1.5;margin-top:4px">${lizaSavNote}</div>
      </div>
      <div class="card">
        <div class="card-title" style="color:#1f5f5f">${PB} — ${pct(c.sb)}%</div>
        <div class="kv"><span class="k">Fair share of expenses</span><span class="v">${fmt(c.shareBe)}</span></div>
        <div class="kv"><span class="k">Actually paid</span><span class="v">${fmt(c.pBe)}</span></div>
        <div class="divider"></div>
        <div class="kv"><span class="k">Savings share (${pct(c.sb)}%)</span><span class="v" style="color:#3a8a4a">${fmt(c.shareBs)}</span></div>
        <div style="font-size:11px;color:#6b8f71;line-height:1.5;margin-top:4px">${PB}'s savings share is settled monthly via the settlement payment.</div>
      </div>
    </div>
    ${chartData.length>0?`
    <div class="card">
      <div class="card-title">Variable Expense Breakdown</div>
      <div class="chart-wrap"><canvas id="expChart"></canvas></div>
      <div class="legend">${chartData.map(([k,v],i)=>`<div class="legend-item"><div class="legend-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></div>${k}: ${fmt(v)}</div>`).join("")}</div>
    </div>`:`<div class="card" style="text-align:center;color:#6b8f71;font-size:13px;padding:24px">Add variable expenses to see the breakdown chart 🌿</div>`}
    <div class="card">
      <div class="card-title">Month Notes</div>
      <textarea placeholder="Add any notes for this month…" oninput="saveNote(this.value)">${m.note||""}</textarea>
    </div>`;
}

function renderCatOptions(selected){
  return CATS.map(c=>`<option${c===selected?" selected":""}>${c}</option>`).join("");
}

function renderRow(e,isFixed){
  if(state.editId===e.id) return `
    <div class="tbl-row">
      <input value="${e.description}" oninput="state.editVals.description=this.value">
      <input value="${e.category||""}" oninput="state.editVals.category=this.value">
      <input type="number" value="${e.amount}" oninput="state.editVals.amount=this.value">
      <select onchange="state.editVals.paidBy=this.value"><option${e.paidBy===PA?" selected":""}>${PA}</option><option${e.paidBy===PB?" selected":""}>${PB}</option></select>
      <select onchange="state.editVals.type=this.value"><option value="expense"${e.type==="expense"?" selected":""}>Expense</option><option value="savings"${e.type==="savings"?" selected":""}>Savings</option></select>
      <div><button class="btn-icon" style="color:#3a8a4a" onclick="saveEdit('${e.id}',${isFixed})">✓</button><button class="btn-icon" onclick="state.editId=null;render()">✕</button></div>
    </div>`;
  return `
    <div class="tbl-row">
      <div>${e.description}</div>
      <div style="font-size:12px;color:#6b8f71">${e.category||""}</div>
      <div style="font-weight:600;color:${e.type==="savings"?"#3a8a4a":"#2d3a2e"}">${fmt(e.amount)}</div>
      ${pill(e.paidBy,e.paidBy===PA?"pill-a":"pill-b")}
      ${pill(e.type,e.type==="savings"?"pill-sav":"pill-exp")}
      <div><button class="btn-icon" onclick='startEdit(${JSON.stringify(e).replace(/'/g,"&#39;")})'>✏️</button><button class="btn-icon" style="color:#e57373" onclick="removeEntry('${e.id}',${isFixed})">🗑️</button></div>
    </div>`;
}

function renderExpenses(m){
  return `
    <div class="card">
      <div class="card-title">Fixed Expenses & Savings</div>
      <div class="tbl-wrap">
        <div class="tbl-head"><span>Description</span><span>Category</span><span>Amount</span><span>Paid By</span><span>Type</span><span></span></div>
        ${m.fixed.map(e=>renderRow(e,true)).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Variable Expenses</div>
      <div class="tbl-wrap">
        <div class="tbl-head"><span>Description</span><span>Category</span><span>Amount</span><span>Paid By</span><span>Type</span><span></span></div>
        ${m.variable.length?m.variable.map(e=>renderRow(e,false)).join(""):'<div style="color:#6b8f71;font-size:13px;padding:12px 0">No variable expenses yet.</div>'}
        <div class="add-row">
          <input placeholder="Description" value="${state.newDesc}" oninput="state.newDesc=this.value">
          <select onchange="state.newCat=this.value">${renderCatOptions(state.newCat)}</select>
          <input type="number" placeholder="Amount" value="${state.newAmt}" oninput="state.newAmt=this.value">
          <select onchange="state.newPaid=this.value"><option${state.newPaid===PA?" selected":""}>${PA}</option><option${state.newPaid===PB?" selected":""}>${PB}</option></select>
          <select onchange="state.newType=this.value"><option value="expense"${state.newType==="expense"?" selected":""}>Expense</option><option value="savings"${state.newType==="savings"?" selected":""}>Savings</option></select>
          <button class="btn-add" onclick="addEntry()">+ Add</button>
        </div>
      </div>
    </div>`;
}

function renderHistory(){
  const keys=Object.keys(state.data).sort().reverse().slice(0,24);
  if(!keys.length) return `<div class="card"><div class="card-title">Monthly History</div><div style="color:#6b8f71;font-size:13px">No data yet.</div></div>`;
  const pendingCount=keys.filter(k=>{ const m=state.data[k],c=calcMonth(m); return Math.abs(c.netA)>=.01&&!m.settlement; }).length;
  return `
    <div class="card">
      <div class="card-title">Monthly History ${pendingCount>0?`<span style="background:#fef3c7;color:#c08010;border-radius:10px;padding:2px 8px;font-size:11px;margin-left:8px">${pendingCount} pending settlement${pendingCount>1?"s":""}</span>`:""}</div>
      ${keys.map(k=>{
        const m=state.data[k],c=calcMonth(m);
        const [yr,mo]=k.split("-"),label=`${MONTHS[parseInt(mo)-1]} ${yr}`;
        const isEven=Math.abs(c.netA)<.01;
        let status;
        if(isEven) status=`<span style="font-size:12px;color:#3a8a4a;font-weight:600">Even ✓</span>`;
        else if(m.settlement) status=`<span style="font-size:12px;color:#3a8a4a;font-weight:600">Settled ✓ · ${m.settlement.date}</span>`;
        else { const ob=c.netA>0?PB:PA; status=`<span style="font-size:12px;color:#c08010;font-weight:600"><span class="pending-dot"></span>${ob} owes ${fmt(Math.abs(c.netA))}</span>`; }
        return `<div class="hist-row">
          <div class="top">
            <span style="font-size:14px;font-weight:700;min-width:130px">${label}</span>
            <span style="font-size:13px;color:#6b8f71">Expenses: <b style="color:#2d3a2e">${fmt(c.totExp)}</b></span>
            <span style="font-size:13px;color:#6b8f71">Savings: <b style="color:#3a8a4a">${fmt(c.totSav)}</b></span>
            <span style="font-size:13px;color:#6b8f71">Split: <b>${pct(c.sa)}/${pct(c.sb)}</b></span>
            ${status}
          </div>
          ${m.note?`<div class="hist-note">📝 ${m.note}</div>`:""}
          ${m.settlement?.note?`<div class="hist-note">💳 ${m.settlement.note}</div>`:""}
        </div>`;
      }).join("")}
    </div>`;
}

function renderSavings(){
  const keys=Object.keys(state.data).sort();
  let cumulative=0;
  const rows=keys.map(k=>{
    const m=state.data[k];
    const sav=[...m.fixed,...m.variable].filter(e=>e.type==="savings");
    const tot=sav.reduce((s,e)=>s+Number(e.amount),0);
    const {sa,sb}=getMonthSplit(m);
    cumulative+=tot;
    const [yr,mo]=k.split("-"),label=`${MONTHS[parseInt(mo)-1]} ${yr}`;
    return {label,tot,cumulative,sa,sb,lizaShare:tot*sa,lauraShare:tot*sb};
  });
  const total=rows.reduce((s,r)=>s+r.tot,0);
  const goal=36000; // annual goal example
  const pctDone=Math.min(100,Math.round(total/goal*100));

  return `
    <div class="card" style="text-align:center;padding:28px">
      <div class="card-title">Total Accumulated Savings</div>
      <div class="savings-total">${fmt(total)}</div>
      <div class="savings-sub">Across ${rows.length} month${rows.length!==1?"s":""} tracked</div>
      <div class="savings-bar" style="margin-top:16px"><div class="savings-bar-fill" style="width:${pctDone}%"></div></div>
      <div style="font-size:12px;color:#6b8f71;margin-top:4px">${pctDone}% of $${fmt(goal)} annual goal</div>
    </div>
    <div class="grid2">
      <div class="card" style="text-align:center">
        <div class="card-title" style="color:#2d5a3d">${PA}'s Total Contribution</div>
        <div class="big" style="color:#2d5a3d">${fmt(rows.reduce((s,r)=>s+r.lizaShare,0))}</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="card-title" style="color:#1f5f5f">${PB}'s Total Contribution</div>
        <div class="big" style="color:#1f5f5f">${fmt(rows.reduce((s,r)=>s+r.lauraShare,0))}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Monthly Savings History</div>
      ${!rows.length?'<div style="color:#6b8f71;font-size:13px">No savings recorded yet.</div>':''}
      ${rows.slice().reverse().map(r=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #e8f0e8;font-size:13px;flex-wrap:wrap;gap:8px">
          <span style="font-weight:600;min-width:120px">${r.label}</span>
          <span style="color:#6b8f71">Monthly: <b style="color:#3a8a4a">${fmt(r.tot)}</b></span>
          <span style="color:#6b8f71">${PA}: <b>${fmt(r.lizaShare)}</b></span>
          <span style="color:#6b8f71">${PB}: <b>${fmt(r.lauraShare)}</b></span>
          <span style="color:#6b8f71">Cumulative: <b style="color:#2d5a3d">${fmt(r.cumulative)}</b></span>
        </div>`).join("")}
    </div>`;
}

function renderModal(c){
  if(!state.showModal) return "";
  const {netA}=c,owedAmt=Math.abs(netA),owedBy=netA>0?PB:PA,owedTo=netA>0?PA:PB;
  return `<div class="overlay">
    <div class="modal">
      <h2>Mark Settlement</h2>
      <p>${owedBy} pays ${owedTo} <span style="color:#c08010;font-weight:700">${fmt(owedAmt)}</span></p>
      <div class="field"><label>Date of payment</label><input type="date" value="${state.settleDate}" oninput="state.settleDate=this.value"></div>
      <div class="field"><label>Note (optional)</label><input placeholder="e.g. e-transfer, cash…" value="${state.settleNote}" oninput="state.settleNote=this.value"></div>
      <div class="modal-btns">
        <button style="background:#3a8a4a;color:#fff" onclick="markSettled('${owedBy}','${owedTo}',${owedAmt})">Confirm Settled</button>
        <button style="background:#f0f4f0;color:#6b8f71;border:1px solid #c8ddc9" onclick="state.showModal=false;render()">Cancel</button>
      </div>
    </div>
  </div>`;
}

function openSettle(){ state.showModal=true; render(); }

function render(){
  const m=curMonth(),c=calcMonth(m);
  document.getElementById("app").innerHTML=`
    <header>
      <h1>🌿 Liza & Laura — Household Tracker <span id="syncdot" class="sync-dot${state.syncing?" saving":""}"></span></h1>
      <div class="month-nav">
        <button class="btn-nav" onclick="navigate(-1)">‹</button>
        <span>${MONTHS[state.month]} ${state.year}</span>
        <button class="btn-nav" onclick="navigate(1)">›</button>
      </div>
    </header>
    <nav>
      ${["dashboard","expenses","history","savings"].map(t=>`
        <button class="btn-tab${state.tab===t?" active":""}" onclick="state.tab='${t}';render()">
          ${t==="dashboard"?"📊 Dashboard":t==="expenses"?"💳 Expenses":t==="history"?"📅 History":"🌱 Savings"}
        </button>`).join("")}
    </nav>
    <main>
      ${state.tab==="dashboard"?renderDashboard(c,m):""}
      ${state.tab==="expenses"?renderExpenses(m):""}
      ${state.tab==="history"?renderHistory():""}
      ${state.tab==="savings"?renderSavings():""}
    </main>
    ${renderModal(c)}`;
}

if(window._DB_READY) loadData();
else window.addEventListener("db-ready",loadData);
</script>
</body>
</html>
